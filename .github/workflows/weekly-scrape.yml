name: Weekly Deal Scraper

on:
  schedule:
    # Every Wednesday at 11am UTC = 6am Central Time
    - cron: '0 11 * * 3'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: node scraper.js

      - name: Rebuild deal-stacker with fresh data
        run: node inject-deals.js

      - name: Commit updated files
        run: |
          git config user.name "grocery-bot"
          git config user.email "bot@grocery-hub.app"
          git add deals-data.json deal-stacker.html
          git diff --staged --quiet || git commit -m "Weekly deal update $(date +'%Y-%m-%d')"
          git push
