name: Weekly Deal Scraper

on:
  schedule:
    - cron: '0 11 * * 3'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scraper.js

      - name: Inject fresh deals into stacker
        run: node inject-deals.js || echo "Inject step had issues but continuing"

      - name: Commit and push updated files
        run: |
          git config user.name "grocery-bot"
          git config user.email "bot@grocery-hub.app"
          git add deals-data.json deal-stacker.html
          git diff --staged --quiet || git commit -m "Weekly deal update $(date +'%Y-%m-%d')"
          git push || echo "Nothing to push"
